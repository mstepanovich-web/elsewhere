<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elsewhere Fashion — Audience</title>
  <link rel="stylesheet" href="/elsewhere/elsewhere-theme.css">
  <style>
    html, body { height: 100%; overflow: hidden; }
    body {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100dvh; padding: 24px;
      background: var(--color-bg);
    }

    .logo {
      font-family: var(--font-display); font-size: 20px;
      font-weight: 300; letter-spacing: .25em; color: rgba(201,169,110,.6);
      text-transform: uppercase; margin-bottom: 48px;
    }
    .logo em { font-style: italic; font-size: 15px; color: rgba(245,236,215,.25); margin-left: 6px; }

    .join-card {
      width: 100%; max-width: 340px;
      background: rgba(14,10,8,.9); border: 1px solid rgba(201,169,110,.2);
      border-radius: 24px; padding: 32px 24px; text-align: center;
    }
    .join-title {
      font-family: var(--font-display); font-size: 32px;
      font-weight: 300; letter-spacing: .08em; color: #F5ECD7; margin-bottom: 6px;
    }
    .join-sub {
      font-size: 12px; letter-spacing: .18em; text-transform: uppercase;
      color: var(--color-text-faint); margin-bottom: 24px;
    }
    .room-input {
      width: 100%; background: rgba(201,169,110,.06);
      border: 1px solid rgba(201,169,110,.25); border-radius: 12px;
      padding: 14px 16px; color: #F5ECD7;
      font-family: var(--font-mono); font-size: 20px;
      letter-spacing: .25em; text-transform: uppercase;
      text-align: center; outline: none; margin-bottom: 14px;
    }
    .room-input:focus { border-color: rgba(201,169,110,.5); }
    .room-input::placeholder { color: rgba(245,236,215,.15); letter-spacing: .2em; }
    .join-btn {
      width: 100%; padding: 14px; border-radius: 999px;
      background: rgba(201,169,110,.7); color: #080504; border: none;
      font-size: 13px; letter-spacing: .2em; text-transform: uppercase;
      font-weight: 600; cursor: pointer;
      transition: background 0.2s; margin-bottom: 0;
    }
    .join-btn:hover { background: #C9A96E; }
    .join-btn:disabled { opacity: .35; cursor: not-allowed; }

    /* Watching state */
    .watch-wrap {
      width: 100%; max-width: 340px; display: none; flex-direction: column;
      align-items: center; gap: 20px;
    }
    .watch-media {
      width: 100%; aspect-ratio: 3/4;
      background: rgba(14,10,8,.9); border: 1px solid rgba(201,169,110,.2);
      border-radius: 20px; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .watch-media img, .watch-media video { width: 100%; height: 100%; object-fit: contain; }
    .watch-placeholder {
      font-size: 40px; opacity: .4;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }
    .watch-placeholder span {
      font-size: 12px; letter-spacing: .15em; text-transform: uppercase;
      color: rgba(245,236,215,.3); font-family: var(--font-ui);
    }
    .reactions {
      display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
    }
    .react-btn {
      font-size: 28px; padding: 12px 16px; border-radius: 16px;
      background: rgba(201,169,110,.06); border: 1px solid rgba(201,169,110,.18);
      cursor: pointer; transition: transform 0.15s, background 0.15s;
      line-height: 1;
    }
    .react-btn:active { transform: scale(1.25); background: rgba(201,169,110,.14); }
    .room-badge {
      font-family: var(--font-mono); font-size: 12px;
      letter-spacing: .2em; text-transform: uppercase;
      color: rgba(201,169,110,.4); text-align: center;
    }
  </style>
</head>
<body>

  <div class="logo">Elsewhere <em>/ Fashion</em></div>

  <!-- Join card -->
  <div class="join-card" id="join-card">
    <div class="join-title">Join</div>
    <div class="join-sub">Enter the room code shown on TV</div>
    <input class="room-input" id="room-input" type="text" maxlength="6"
      placeholder="ABCD" autocomplete="off" spellcheck="false">
    <button class="join-btn" id="join-btn" disabled>Watch the Reveal →</button>
  </div>

  <!-- Watching state -->
  <div class="watch-wrap" id="watch-wrap">
    <div class="room-badge" id="room-badge">Room —</div>
    <div class="watch-media" id="watch-media">
      <div class="watch-placeholder">
        <span>✨</span>
        <span>Waiting for render...</span>
      </div>
    </div>
    <div class="reactions">
      <button class="react-btn" data-emoji="🔥">🔥</button>
      <button class="react-btn" data-emoji="💅">💅</button>
      <button class="react-btn" data-emoji="😍">😍</button>
      <button class="react-btn" data-emoji="✨">✨</button>
    </div>
  </div>

  <script>
  const roomInput = document.getElementById('room-input');
  const joinBtn   = document.getElementById('join-btn');

  roomInput.addEventListener('input', () => {
    roomInput.value = roomInput.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
    joinBtn.disabled = roomInput.value.length < 4;
  });

  let bc = null;

  joinBtn.addEventListener('click', () => {
    const code = roomInput.value.toUpperCase();
    document.getElementById('join-card').style.display = 'none';
    const ww = document.getElementById('watch-wrap');
    ww.style.display = 'flex';
    document.getElementById('room-badge').textContent = 'Room ' + code;

    bc = new BroadcastChannel('elsewhere_fashion_' + code);
    bc.onmessage = e => handleEvent(e.data);
  });

  function handleEvent(ev) {
    if (ev.type === 'render_complete') {
      const media = document.getElementById('watch-media');
      if (ev.videoUrl) {
        media.innerHTML = `<video src="${ev.videoUrl}" autoplay loop muted playsinline></video>`;
      } else if (ev.stills && ev.stills.length > 0) {
        media.innerHTML = `<img src="${ev.stills[0]}" alt="Your look">`;
      }
    }
  }

  document.querySelectorAll('.react-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (bc) bc.postMessage({ type: 'audience_reaction', emoji: btn.dataset.emoji });
    });
  });
  </script>


  <div style="position:fixed;bottom:16px;right:20px;z-index:999;font-family:var(--font-mono);font-size:var(--text-xs);letter-spacing:var(--tracking-wider);color:var(--color-gold);pointer-events:none;">v2.77</div>
</body>
</html>
