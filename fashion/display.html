<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elsewhere Fashion — Display</title>
  <link rel="stylesheet" href="/elsewhere/elsewhere-theme.css">
  <style>
    html, body {
      height: 100%; overflow: hidden;
      background: #040206;
    }
    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; position: relative;
    }

    /* Ambient background */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 50% 70% at 50% 100%, rgba(201,169,110,.05) 0%, transparent 60%),
        radial-gradient(ellipse 80% 40% at 50% 0%, rgba(201,169,110,.03) 0%, transparent 60%),
        #040206;
    }

    /* Wordmark */
    .wordmark {
      position: fixed; top: 36px; left: 50%; transform: translateX(-50%);
      z-index: 20;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 22px; font-weight: 300; letter-spacing: .28em;
      color: rgba(201,169,110,.6); text-transform: uppercase;
    }
    .wordmark em {
      font-style: italic; font-size: 16px; color: rgba(245,236,215,.25);
      margin-left: 8px; letter-spacing: .1em;
    }

    /* Session info top-right */
    .session-info {
      position: fixed; top: 32px; right: 40px; z-index: 20;
      display: flex; align-items: center; gap: 8px;
    }
    .session-room {
      font-family: 'DM Mono', monospace; font-size: 13px;
      letter-spacing: .18em; color: rgba(201,169,110,.5);
      text-transform: uppercase;
    }
    .session-dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(201,169,110,.3); }
    .session-dot.live { background: #00e87a; box-shadow: 0 0 8px #00e87a; animation: el-pulse 1.4s infinite; }

    /* ── Screens ──────────────────────────────────── */
    .screen {
      position: absolute; inset: 0; z-index: 10;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.6s ease;
    }
    .screen.active { display: flex; }
    .screen.visible { opacity: 1; }

    /* Screen 1: Idle */
    .idle-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(48px, 7vw, 96px); font-weight: 300;
      letter-spacing: .12em; color: rgba(245,236,215,.85);
      text-align: center; margin-bottom: 12px;
    }
    .idle-sub {
      font-size: 15px; letter-spacing: .2em; text-transform: uppercase;
      color: rgba(201,169,110,.5); margin-bottom: 48px; text-align: center;
    }
    .qr-wrap {
      width: 140px; height: 140px;
      background: rgba(245,236,215,.06);
      border: 1px solid rgba(201,169,110,.2);
      border-radius: 16px; display: flex;
      align-items: center; justify-content: center;
      margin: 0 auto; margin-bottom: 16px; flex-direction: column; gap: 8px;
    }
    .qr-icon { font-size: 48px; }
    .qr-label {
      font-size: 11px; letter-spacing: .18em; text-transform: uppercase;
      color: rgba(201,169,110,.4); text-align: center;
    }
    .idle-url {
      font-family: 'DM Mono', monospace; font-size: 13px;
      letter-spacing: .12em; color: rgba(201,169,110,.45); text-align: center;
    }

    /* Screen 2: Mode confirmed */
    .mode-badge {
      font-size: 12px; letter-spacing: .22em; text-transform: uppercase;
      color: rgba(0,232,122,.8); margin-bottom: 20px;
      display: flex; align-items: center; gap: 8px;
    }
    .confirmed-mode {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(52px, 8vw, 110px); font-weight: 300;
      letter-spacing: .10em; color: #F5ECD7;
      text-align: center; margin-bottom: 20px; line-height: 1;
    }
    .confirmed-time {
      font-size: 15px; letter-spacing: .2em; text-transform: uppercase;
      color: rgba(201,169,110,.5); margin-bottom: 40px;
    }
    .prep-bar {
      width: 240px; height: 1px; background: rgba(201,169,110,.15); margin: 0 auto;
      position: relative; overflow: hidden;
    }
    .prep-bar::after {
      content: ''; position: absolute; inset: 0;
      background: #C9A96E; transform: translateX(-100%);
      animation: prepScan 2.4s ease-in-out infinite;
    }
    @keyframes prepScan {
      0%   { transform: translateX(-100%); }
      50%  { transform: translateX(0); }
      100% { transform: translateX(100%); }
    }

    /* Screen 3: Rendering */
    .render-icon {
      width: 100px; height: 100px; border-radius: 50%;
      border: 1.5px solid rgba(201,169,110,.2);
      border-top-color: #C9A96E;
      animation: spin 1.4s linear infinite; margin-bottom: 40px;
      position: relative;
    }
    .render-icon::after {
      content: '✨'; position: absolute;
      inset: 0; display: flex; align-items: center; justify-content: center;
      font-size: 32px; animation: spin 1.4s linear infinite reverse;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .render-stage-label {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(36px, 5vw, 64px); font-weight: 300;
      letter-spacing: .12em; color: #F5ECD7; text-align: center;
      margin-bottom: 12px; min-height: 80px;
      transition: opacity 0.4s ease;
    }
    .render-progress-bar {
      width: min(400px, 70vw); height: 2px;
      background: rgba(201,169,110,.12); border-radius: 999px;
      overflow: hidden; margin: 24px auto 0;
    }
    .render-progress-fill {
      height: 100%; background: #C9A96E; border-radius: 999px;
      width: 0%; transition: width 1.2s ease;
      box-shadow: 0 0 12px rgba(201,169,110,.5);
    }
    .render-elapsed-tv {
      font-family: 'DM Mono', monospace; font-size: 15px;
      letter-spacing: .2em; color: rgba(201,169,110,.4); margin-top: 14px;
    }

    /* Screen 4: Result */
    .result-wrap {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .result-wrap img, .result-wrap video {
      max-height: 100vh; max-width: 100vw;
      object-fit: contain;
    }
    .result-overlay {
      position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 16px; align-items: center;
      opacity: 0; transition: opacity 0.6s ease 1.5s;
    }
    .result-overlay.show { opacity: 1; }
    .result-btn {
      padding: 12px 28px; border-radius: 999px;
      font-size: 12px; letter-spacing: .2em; text-transform: uppercase;
      cursor: pointer; border: 1px solid rgba(201,169,110,.35);
      background: rgba(4,2,6,.85); color: rgba(201,169,110,.8);
      backdrop-filter: blur(8px); transition: border-color 0.2s, background 0.2s;
    }
    .result-btn:hover { border-color: rgba(201,169,110,.7); background: rgba(201,169,110,.1); }

    /* Reaction burst (from audience) */
    .reaction-burst {
      position: fixed; font-size: 36px;
      animation: burstUp 1.8s ease forwards;
      z-index: 50; pointer-events: none;
    }
    @keyframes burstUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-120px) scale(1.4); }
    }
  </style>
</head>
<body>

  <div class="bg"></div>

  <div class="wordmark">Elsewhere <em>/ Fashion</em></div>

  <div class="session-info">
    <div class="session-dot" id="status-dot"></div>
    <div class="session-room" id="session-room-label">—</div>
  </div>

  <!-- ══════════════════════════════════════════════ -->
  <!-- SCREEN 1: Idle / Waiting                      -->
  <!-- ══════════════════════════════════════════════ -->
  <div class="screen active" id="screen-1">
    <div class="idle-title">Fashion</div>
    <div class="idle-sub">Try On · Transform · Reveal</div>
    <div class="qr-wrap">
      <div class="qr-icon">📱</div>
      <div class="qr-label">Scan to open<br>on phone</div>
    </div>
    <div class="idle-url" id="stylist-url">elsewhere.app/fashion/stylist</div>
  </div>

  <!-- ══════════════════════════════════════════════ -->
  <!-- SCREEN 2: Mode confirmed                      -->
  <!-- ══════════════════════════════════════════════ -->
  <div class="screen" id="screen-2">
    <div class="mode-badge">
      <span class="el-dot el-dot-ok"></span>
      <span id="screen2-room">Session ready</span>
    </div>
    <div class="confirmed-mode" id="confirmed-mode-label">—</div>
    <div class="confirmed-time" id="confirmed-time-label">Preparing...</div>
    <div class="prep-bar"></div>
  </div>

  <!-- ══════════════════════════════════════════════ -->
  <!-- SCREEN 3: Rendering                           -->
  <!-- ══════════════════════════════════════════════ -->
  <div class="screen" id="screen-3">
    <div class="render-icon"></div>
    <div class="render-stage-label" id="tv-render-label">Generating your look...</div>
    <div class="render-progress-bar">
      <div class="render-progress-fill" id="tv-render-fill"></div>
    </div>
    <div class="render-elapsed-tv" id="tv-elapsed">0:00</div>
  </div>

  <!-- ══════════════════════════════════════════════ -->
  <!-- SCREEN 4: Result                              -->
  <!-- ══════════════════════════════════════════════ -->
  <div class="screen" id="screen-4">
    <div class="result-wrap" id="tv-result-wrap">
      <!-- Populated by JS -->
    </div>
    <div class="result-overlay" id="result-overlay">
      <button class="result-btn" id="tv-again">Try Again</button>
    </div>
  </div>

  <script>
  // ═══════════════════════════════════════════════
  //  Config
  // ═══════════════════════════════════════════════
  const modeConfig = {
    image:               { time: '~20 sec',   label: 'Image' },
    animated_still:      { time: '~1 min',    label: 'Animated Still' },
    multi_angle:         { time: '~2 min',    label: 'Multi-Angle' },
    catwalk:             { time: '~3–4 min',  label: 'Catwalk' },
    multi_angle_catwalk: { time: '~4 min',    label: 'Multi-Angle Catwalk' },
  };

  const renderStages = {
    image:               ['Generating your look...'],
    animated_still:      ['Generating your look...', 'Adding motion...'],
    multi_angle:         ['Generating your look...', 'Creating all angles...', 'Editing your video...'],
    catwalk:             ['Generating your look...', 'Hitting the catwalk...'],
    multi_angle_catwalk: ['Generating your look...', 'Creating all angles...', 'Hitting the catwalk...', 'Putting it all together...'],
  };

  // ═══════════════════════════════════════════════
  //  Screen management
  // ═══════════════════════════════════════════════
  let currentScreen = 1;

  function goTo(n) {
    const prev = document.getElementById('screen-' + currentScreen);
    const next = document.getElementById('screen-' + n);
    prev.classList.remove('visible');
    setTimeout(() => {
      prev.classList.remove('active');
      next.classList.add('active');
      requestAnimationFrame(() => next.classList.add('visible'));
    }, 400);
    currentScreen = n;
  }

  setTimeout(() => document.getElementById('screen-1').classList.add('visible'), 50);

  // ═══════════════════════════════════════════════
  //  Agora / BroadcastChannel listener
  // ═══════════════════════════════════════════════
  // Get room code from URL param e.g. display.html?room=ABCD
  const urlRoom = new URLSearchParams(location.search).get('room') || '';
  document.getElementById('session-room-label').textContent = urlRoom || 'No room';

  const bc = urlRoom ? new BroadcastChannel('elsewhere_fashion_' + urlRoom.toUpperCase()) : null;

  if (bc) {
    bc.onmessage = e => handleEvent(e.data);
  }

  // Also listen to render API webhook (SSE or polling) — stub for now
  // TODO: connect to render server SSE when backend is live

  function handleEvent(ev) {
    console.log('[display] event:', ev);

    if (ev.type === 'mode_selected') {
      const cfg = modeConfig[ev.mode] || {};
      document.getElementById('confirmed-mode-label').textContent = cfg.label || ev.mode;
      document.getElementById('confirmed-time-label').textContent = 'Est. ' + (cfg.time || '—');
      document.getElementById('screen2-room').textContent = 'Room ' + (ev.roomCode || urlRoom);
      document.getElementById('status-dot').classList.add('live');
      goTo(2);
    }

    if (ev.type === 'render_started') {
      const stages = renderStages[ev.mode] || ['Generating your look...'];
      startRenderDisplay(ev.mode, stages);
      goTo(3);
    }

    if (ev.type === 'render_progress') {
      const label = document.getElementById('tv-render-label');
      label.style.opacity = '0';
      setTimeout(() => {
        label.textContent = ev.label;
        label.style.opacity = '1';
      }, 300);
    }

    if (ev.type === 'render_complete') {
      stopRenderDisplay();
      showResultOnTV(ev);
      goTo(4);
    }

    if (ev.type === 'audience_reaction') {
      spawnReaction(ev.emoji);
    }
  }

  // ═══════════════════════════════════════════════
  //  Render progress display
  // ═══════════════════════════════════════════════
  let renderTimer = null;
  let renderProgressTimer = null;

  function startRenderDisplay(mode, stages) {
    const fill = document.getElementById('tv-render-fill');
    const label = document.getElementById('tv-render-label');
    const elapsed = document.getElementById('tv-elapsed');
    const cfg = modeConfig[mode] || modeConfig.image;

    // Parse rough duration
    const durations = { '~20 sec': 25000, '~1 min': 70000, '~2 min': 130000, '~3–4 min': 210000, '~4 min': 260000 };
    const totalMs = durations[cfg.time] || 90000;

    label.textContent = stages[0];
    fill.style.width = '3%';

    const start = Date.now();
    let stageIdx = 0;

    const stageMs = stages.length > 1 ? totalMs / stages.length : totalMs;
    if (stages.length > 1) {
      renderTimer = setInterval(() => {
        stageIdx = (stageIdx + 1) % stages.length;
        label.style.opacity = '0';
        setTimeout(() => {
          label.textContent = stages[stageIdx];
          label.style.opacity = '1';
        }, 300);
      }, stageMs);
    }

    renderProgressTimer = setInterval(() => {
      const pct = Math.min(90, ((Date.now() - start) / totalMs) * 90);
      fill.style.width = pct + '%';
      const secs = Math.floor((Date.now() - start) / 1000);
      elapsed.textContent = Math.floor(secs / 60) + ':' + String(secs % 60).padStart(2, '0');
    }, 600);
  }

  function stopRenderDisplay() {
    clearInterval(renderTimer);
    clearInterval(renderProgressTimer);
    document.getElementById('tv-render-fill').style.width = '100%';
  }

  // ═══════════════════════════════════════════════
  //  Result display
  // ═══════════════════════════════════════════════
  function showResultOnTV(ev) {
    const wrap = document.getElementById('tv-result-wrap');
    if (ev.videoUrl) {
      wrap.innerHTML = `<video src="${ev.videoUrl}" autoplay loop muted playsinline></video>`;
    } else if (ev.stills && ev.stills.length > 0) {
      wrap.innerHTML = `<img src="${ev.stills[0]}" alt="Result">`;
    } else {
      wrap.innerHTML = `
        <div style="text-align:center;">
          <div style="font-size:80px;margin-bottom:24px;">✨</div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:64px;font-weight:300;letter-spacing:.10em;color:#F5ECD7;">
            Reveal
          </div>
        </div>`;
    }
    setTimeout(() => document.getElementById('result-overlay').classList.add('show'), 1600);
  }

  document.getElementById('tv-again').addEventListener('click', () => {
    document.getElementById('tv-result-wrap').innerHTML = '';
    document.getElementById('result-overlay').classList.remove('show');
    document.getElementById('status-dot').classList.remove('live');
    goTo(1);
  });

  // ═══════════════════════════════════════════════
  //  Audience reactions
  // ═══════════════════════════════════════════════
  function spawnReaction(emoji) {
    const el = document.createElement('div');
    el.className = 'reaction-burst';
    el.textContent = emoji;
    el.style.left = (20 + Math.random() * 60) + 'vw';
    el.style.bottom = '10vh';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2000);
  }

  // ═══════════════════════════════════════════════
  //  Dev: Keyboard shortcuts for testing
  // ═══════════════════════════════════════════════
  document.addEventListener('keydown', e => {
    if (e.key === '1') handleEvent({ type: 'mode_selected', mode: 'catwalk', roomCode: urlRoom });
    if (e.key === '2') handleEvent({ type: 'render_started', mode: 'catwalk' });
    if (e.key === '3') handleEvent({ type: 'render_complete', stills: [], videoUrl: null });
    if (e.key === 'r') spawnReaction(['🔥','💅','😍','✨'][Math.floor(Math.random()*4)]);
  });
  </script>


  <div style="position:fixed;bottom:16px;right:20px;z-index:999;font-family:var(--font-mono);font-size:var(--text-xs);letter-spacing:var(--tracking-wider);color:var(--color-gold);pointer-events:none;">v2.83</div>
</body>
</html>
