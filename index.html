<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elsewhere</title>
  <link rel="stylesheet" href="/elsewhere/elsewhere-theme.css">
  <style>
    html, body { height: 100%; overflow: hidden; background: var(--color-bg); }
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100dvh; }

    .bg-ambient {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 60% 60% at 20% 50%, rgba(255,200,80,.04) 0%, transparent 70%),
        radial-gradient(ellipse 50% 50% at 80% 50%, rgba(201,169,110,.04) 0%, transparent 70%),
        var(--color-bg);
    }

    .wordmark {
      position: relative; z-index: 10;
      font-family: var(--font-display);
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 300; letter-spacing: var(--tracking-widest);
      color: var(--color-gold-bright); text-transform: uppercase;
      margin-bottom: clamp(32px, 6vh, 64px); text-align: center;
      opacity: 0; animation: fadeUp 0.7s 0.1s ease forwards;
    }
    .wordmark em {
      font-style: italic; color: var(--color-text-faint);
      font-size: 0.5em; letter-spacing: var(--tracking-wider);
      display: block; margin-top: 6px;
    }

    .mode-grid {
      position: relative; z-index: 10;
      display: flex; gap: clamp(16px, 3vw, 32px);
      align-items: stretch; flex-wrap: wrap;
      justify-content: center; padding: 0 20px;
      max-width: 900px; width: 100%;
    }

    .mode-tile {
      flex: 1 1 280px; max-width: 380px;
      min-height: clamp(200px, 40vh, 340px);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; border: 1px solid var(--color-border-dim);
      border-radius: var(--radius-xl); cursor: pointer;
      position: relative; overflow: hidden;
      transition: border-color 0.3s ease, transform 0.25s ease;
      text-decoration: none; padding: 40px 32px;
      opacity: 0; animation: fadeUp 0.6s ease forwards;
    }
    .mode-tile:nth-child(1) { animation-delay: 0.25s; }
    .mode-tile:nth-child(2) { animation-delay: 0.38s; }

    .mode-tile--karaoke {
      background: linear-gradient(145deg, rgba(20,12,8,.92) 0%, rgba(12,6,4,.96) 100%);
    }
    .mode-tile--karaoke::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 80%, rgba(255,200,80,.07) 0%, transparent 70%);
      pointer-events: none;
    }
    .mode-tile--karaoke:hover { border-color: var(--color-border-bright); transform: translateY(-3px); }

    .mode-tile--fashion {
      background: linear-gradient(145deg, rgba(14,10,8,.94) 0%, rgba(8,5,4,.97) 100%);
    }
    .mode-tile--fashion::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 80%, rgba(201,169,110,.07) 0%, transparent 70%);
      pointer-events: none;
    }
    .mode-tile--fashion:hover { border-color: rgba(201,169,110,.55); transform: translateY(-3px); }

    .tile-icon {
      font-size: clamp(40px, 8vw, 64px); line-height: 1;
      filter: saturate(0.7); transition: filter 0.25s ease, transform 0.25s ease;
    }
    .mode-tile:hover .tile-icon { filter: saturate(1.2); transform: scale(1.06); }

    .tile-label {
      font-family: var(--font-display); font-size: clamp(24px, 4vw, 40px);
      font-weight: 400; letter-spacing: var(--tracking-wide);
      color: var(--color-gold-bright); text-align: center;
    }
    .mode-tile--fashion .tile-label { color: #F5ECD7; }

    .tile-tagline {
      font-family: var(--font-ui); font-size: var(--text-sm);
      letter-spacing: var(--tracking-wider); text-transform: uppercase;
      color: var(--color-text-faint); text-align: center;
    }

    .tile-arrow {
      margin-top: 12px; font-size: var(--text-sm);
      letter-spacing: var(--tracking-wider);
      color: var(--color-text-ghost);
      transition: color 0.2s ease, transform 0.2s ease; display: inline-block;
    }
    .mode-tile:hover .tile-arrow { color: var(--color-text-dim); transform: translateX(4px); }
    .mode-tile--fashion:hover .tile-arrow { color: rgba(201,169,110,.70); }

    .device-hint {
      position: relative; z-index: 10;
      margin-top: clamp(24px, 4vh, 48px);
      font-size: var(--text-xs); letter-spacing: var(--tracking-wider);
      color: var(--color-text-ghost); text-align: center;
      opacity: 0; animation: fadeUp 0.5s 0.6s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .mode-grid { flex-direction: column; align-items: center; }
      .mode-tile  { min-height: 160px; }
    }
  </style>
</head>
<body>
  <div class="bg-ambient"></div>
  <div class="wordmark">Elsewhere<em>choose your experience</em></div>

  <div class="mode-grid">
    <a class="mode-tile mode-tile--karaoke" href="#" id="tile-karaoke">
      <div class="tile-icon">🎤</div>
      <div class="tile-label">Karaoke</div>
      <div class="tile-tagline">Sing · Perform · Celebrate</div>
      <div class="tile-arrow">Open →</div>
    </a>
    <a class="mode-tile mode-tile--fashion" href="fashion/stylist.html" id="tile-fashion">
      <div class="tile-icon">✨</div>
      <div class="tile-label">Fashion</div>
      <div class="tile-tagline">Try On · Transform · Reveal</div>
      <div class="tile-arrow">Open →</div>
    </a>
  </div>

  <div class="device-hint">TV &amp; phone experiences available for each mode</div>

  <script>
    const isMobile = window.innerWidth <= 768;
    document.getElementById('tile-karaoke').href = isMobile ? 'singer.html' : 'stage.html';
    document.getElementById('tile-fashion').href = isMobile ? 'fashion/stylist.html' : 'fashion/display.html';
  </script>

  <div style="position:fixed;bottom:16px;right:20px;z-index:999;font-family:var(--font-mono);font-size:var(--text-xs);letter-spacing:var(--tracking-wider);color:var(--color-gold);pointer-events:none;">v2.69</div>
</body>
</html>
